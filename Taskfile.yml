# https://taskfile.dev

version: '3'

vars:
  GREETING: Hello, World!
  VSCODE_DIR: editors/vscode

tasks:
  default:
    cmds:
      - echo "{{.GREETING}}"
    silent: true

  vscode:install:
    desc: Install VS Code extension dependencies
    dir: '{{.VSCODE_DIR}}'
    cmds:
      - npm install

  vscode:compile:
    desc: Compile the VS Code extension
    dir: '{{.VSCODE_DIR}}'
    deps:
      - vscode:install
    cmds:
      - npm run compile

  vscode:test:
    desc: Run the VS Code extension tests
    dir: '{{.VSCODE_DIR}}'
    deps:
      - vscode:install
    cmds:
      - npm test

  vscode:package:
    desc: Package the VS Code extension into a .vsix file
    dir: '{{.VSCODE_DIR}}'
    deps:
      - vscode:compile
    cmds:
      - npm run package

  vsix:
    desc: Deprecated alias for vscode:package
    cmds:
      - task vscode:package
